# https://render.com/docs/deploy-fastapi

services:
  - type: web
    name: ai-barber-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: WHATSAPP_PHONE_NUMBER_ID
        fromEnv: WHATSAPP_PHONE_NUMBER_ID
      - key: WHATSAPP_ACCESS_TOKEN
        fromEnv: WHATSAPP_ACCESS_TOKEN
      - key: WHATSAPP_VERIFY_TOKEN
        fromEnv: WHATSAPP_VERIFY_TOKEN
      - key: GEMINI_API_KEY
        fromEnv: GEMINI_API_KEY
      - key: REPLICATE_API_TOKEN
        fromEnv: REPLICATE_API_TOKEN
      - key: HUGGINGFACE_API_TOKEN
        fromEnv: HUGGINGFACE_API_TOKEN
      - key: BUSINESS_PHONE_NUMBER
        fromEnv: BUSINESS_PHONE_NUMBER
      - key: BARBER_PHONE_NUMBER
        fromEnv: BARBER_PHONE_NUMBER
